name: Waka Readme
on:
  schedule:
    # Runs at the start of every hour
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
